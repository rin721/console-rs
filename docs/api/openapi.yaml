            application/json:
              schema:
                $ref: '#/components/schemas/SessionSnapshot'
          description: 成功
      summary: 接受组织邀请并建立会话
      tags:
      - IAM Invitation
      x-console-access: public
      x-console-permission: null
      x-console-product-code: console
      x-console-scope: platform
  /api/v1/auth/login:
    post:
      operationId: iam.login
