    SetupStatus:
      additionalProperties: false
      properties:
        completed:
          type: boolean
        has_initial_admin:
          type: boolean
        required_steps:
          items:
            $ref: '#/components/schemas/SetupStepStatus'
          type: array
      required:
      - completed
      - has_initial_admin
      - required_steps
      type: object
    SetupStepLog:
      additionalProperties: false
      properties:
        created_at:
          type: string
        message:
          type: string
        status:
          type: string
        step_key:
          type: string
      required:
      - step_key
      - status
      - message
      - created_at
      type: object
    SetupStepSchema:
      additionalProperties: false
      properties:
        fields:
          items:
