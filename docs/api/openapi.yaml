info:
  description: 由 Rust route registry 生成的当前有效 API 契约，禁止手写漂移。
  title: Aoi[葵] API
  version: 0.1.0
openapi: 3.1.0
paths:
  /api/v1/auth/email-verifications:
    post:
      operationId: iam.email-verification.request
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestEmailVerification'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationDelivery'
          description: 成功
      summary: 创建邮箱验证通知
      tags:
      - IAM
      x-console-access: public
      x-console-permission: null
      x-console-product-code: console
      x-console-scope: platform
  /api/v1/auth/email-verifications/confirm:
    post:
      operationId: iam.email-verification.confirm
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmEmailVerificationRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanResult'
          description: 成功
      summary: 确认邮箱验证令牌
      tags:
      - IAM
      x-console-access: public
      x-console-permission: null
      x-console-product-code: console
      x-console-scope: platform
  /api/v1/auth/invitations/accept:
    post:
