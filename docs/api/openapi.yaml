components:
  schemas:
    APITokenSummary:
      additionalProperties: false
      properties:
        created_at:
          type: string
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
        id:
          format: int64
          type: integer
        org_id:
          format: int64
          type: integer
        revoked_at:
          anyOf:
          - type: string
          - type: 'null'
        status:
          type: string
        token_prefix:
          type: string
        user_id:
          format: int64
          type: integer
      required:
      - id
      - org_id
      - user_id
      - token_prefix
      - status
      - created_at
      type: object
    AcceptInvitationRequest:
      additionalProperties: false
      properties:
        display_name:
          type: string
        password:
          description: 邀请接受密码
          format: password
          type: string
          writeOnly: true
        token:
          type: string
      required:
      - token
      - password
      - display_name
      type: object
    ApiCatalogEntry:
      additionalProperties: false
      properties:
        access:
          type: string
        id:
          type: string
        method:
          type: string
        path:
          type: string
        permission:
          anyOf:
          - type: string
          - type: 'null'
        product_code:
          type: string
        scope:
          type: string
        summary:
          type: string
        tag:
          type: string
      required:
      - id
      - method
      - path
      - tag
      - summary
      - access
      - scope
      - product_code
      type: object
    ApiCatalogGroup:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/ApiCatalogEntry'
          type: array
        tag:
          type: string
      required:
      - tag
      - items
      type: object
    BooleanResult:
      additionalProperties: false
      properties:
        accepted:
          anyOf:
          - type: boolean
          - type: 'null'
        deleted:
          anyOf:
          - type: boolean
          - type: 'null'
        reset:
          anyOf:
          - type: boolean
          - type: 'null'
        revoked:
          anyOf:
          - type: boolean
          - type: 'null'
        verified:
          anyOf:
          - type: boolean
          - type: 'null'
      required: []
      type: object
    CompleteSetupRequest:
      additionalProperties: false
      properties:
        confirm:
          type: boolean
        run_id:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - confirm
      type: object
    CompleteSetupResult:
      additionalProperties: false
      properties:
        completed:
          type: boolean
      required:
      - completed
      type: object
    ConfirmEmailVerificationRequest:
      additionalProperties: false
      properties:
        token:
          description: 邮箱验证一次性令牌
          format: password
          type: string
          writeOnly: true
      required:
      - token
      type: object
    CreateAPITokenRequest:
      additionalProperties: false
      properties:
        expires_in_days:
          anyOf:
          - format: int64
            type: integer
          - type: 'null'
        remark:
          anyOf:
          - type: string
          - type: 'null'
      required: []
      type: object
    CreateAPITokenResult:
      additionalProperties: false
      properties:
        item:
          $ref: '#/components/schemas/APITokenSummary'
        token:
          description: 仅创建时返回一次的 API Token 明文
          type: string
          x-console-sensitive: true
      required:
      - item
      - token
      type: object
    CreateMediaAssetRequest:
      additionalProperties: false
      properties:
        category:
          anyOf:
          - type: string
          - type: 'null'
        display_name:
          type: string
        mime_type:
          type: string
        size_bytes:
          format: int64
          type: integer
        storage_key:
          type: string
      required:
      - display_name
      - storage_key
      - mime_type
      - size_bytes
      type: object
    CreateRoleRequest:
      additionalProperties: false
      properties:
        code:
          type: string
        name:
          type: string
        permission_codes:
          items:
            type: string
          type: array
      required:
      - code
      - name
      - permission_codes
      type: object
    CreateSetupRunRequest:
      additionalProperties: false
      properties:
        reason:
          anyOf:
          - type: string
          - type: 'null'
      required: []
      type: object
    CreateTrafficProbeTargetRequest:
      additionalProperties: false
      properties:
        expected_status:
          anyOf:
          - format: int64
            type: integer
          - type: 'null'
        name:
          type: string
        url:
          type: string
      required:
      - name
      - url
      type: object
    CreateVersionPackageRequest:
      additionalProperties: false
      properties:
        manifest:
          additionalProperties: true
          description: 任意 JSON 值
        version_code:
          type: string
        version_name:
          type: string
      required:
      - version_name
      - version_code
      - manifest
      type: object
    DeleteResult:
      additionalProperties: false
      properties:
        deleted:
          type: boolean
      required:
      - deleted
      type: object
    DeleteStorageObjectRequest:
      additionalProperties: false
      properties:
        storage_key:
          type: string
      required:
      - storage_key
      type: object
    ForgotPasswordRequest:
      additionalProperties: false
      properties:
        email:
          type: string
      required:
      - email
      type: object
    IamSetupStatus:
      additionalProperties: false
      properties:
        initialized:
          type: boolean
      required:
      - initialized
      type: object
    InitialAdminRequest:
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
        organization_code:
          type: string
        organization_name:
          type: string
        password:
          description: 初始管理员密码
          format: password
          type: string
          writeOnly: true
      required:
      - email
      - password
      - display_name
      - organization_code
      - organization_name
      type: object
    InvitationSummary:
      additionalProperties: false
      properties:
        accepted_at:
          anyOf:
          - type: string
          - type: 'null'
        created_at:
          type: string
        email:
          type: string
        expires_at:
          type: string
        id:
          format: int64
          type: integer
        org_id:
          format: int64
          type: integer
        revoked_at:
          anyOf:
          - type: string
          - type: 'null'
        role_code:
          type: string
        status:
          type: string
      required:
      - id
      - org_id
      - email
      - role_code
      - status
      - expires_at
      - created_at
      type: object
    InviteUserRequest:
      additionalProperties: false
      properties:
        email:
          type: string
        role_code:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - email
      type: object
    InviteUserResult:
      additionalProperties: false
      properties:
        delivery:
          $ref: '#/components/schemas/NotificationDelivery'
        item:
          $ref: '#/components/schemas/InvitationSummary'
      required:
      - item
      - delivery
      type: object
    LoginRequest:
      additionalProperties: false
      properties:
        identifier:
          type: string
        mfa_code:
          anyOf:
          - type: string
          - type: 'null'
        password:
          description: 登录密码
          format: password
          type: string
          writeOnly: true
      required:
      - identifier
      - password
      type: object
    LogoutResult:
      additionalProperties: false
      properties:
        logged_out:
          type: boolean
      required:
      - logged_out
      type: object
    MediaAssetEntry:
      additionalProperties: false
      properties:
        category:
          anyOf:
          - type: string
          - type: 'null'
        created_at:
          type: string
        display_name:
          type: string
        id:
          format: int64
          type: integer
        mime_type:
          type: string
        size_bytes:
          format: int64
          type: integer
        storage_key:
          type: string
      required:
      - id
      - display_name
      - storage_key
      - mime_type
      - size_bytes
      - created_at
      type: object
    MediaUploadMultipart:
      additionalProperties: false
      properties:
        category:
          anyOf:
          - type: string
          - type: 'null'
        display_name:
          type: string
        file:
          format: binary
          type: string
      required:
      - file
      type: object
    MfaFactorSummary:
      additionalProperties: false
      properties:
        created_at:
          type: string
        id:
          format: int64
          type: integer
        kind:
          type: string
        revoked_at:
          anyOf:
          - type: string
          - type: 'null'
        status:
          type: string
        verified_at:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - id
      - kind
      - status
      - created_at
      type: object
    MfaRecoveryCodeSummary:
      additionalProperties: false
      properties:
        code_prefix:
          type: string
        created_at:
          type: string
        id:
          format: int64
          type: integer
        revoked_at:
          anyOf:
          - type: string
          - type: 'null'
        status:
          type: string
        used_at:
          anyOf:
          - type: string
          - type: 'null'
      required:
      - id
      - code_prefix
      - status
      - created_at
      type: object
    MfaRecoveryCodesResult:
      additionalProperties: false
      properties:
        items:
          items:
            $ref: '#/components/schemas/MfaRecoveryCodeSummary'
          type: array
        recovery_codes:
          items:
            description: 仅轮换时返回一次的 MFA 恢复码
            type: string
            x-console-sensitive: true
          type: array
      required:
      - items
      - recovery_codes
      type: object
    MfaSetupResult:
      additionalProperties: false
      properties:
        factor:
          $ref: '#/components/schemas/MfaFactorSummary'
        otpauth_url:
          description: 包含 TOTP secret 的一次性 URI
          type: string
          x-console-sensitive: true
        secret:
          description: 仅设置时返回一次的 TOTP secret
          type: string
          x-console-sensitive: true
      required:
      - factor
      - secret
      - otpauth_url
      type: object
    MfaVerifyResult:
      additionalProperties: false
      properties:
        recovery_codes:
          items:
            description: 仅启用时返回一次的 MFA 恢复码
            type: string
            x-console-sensitive: true
          type: array
        verified:
          type: boolean
      required:
      - verified
      - recovery_codes
      type: object
    NotificationDelivery:
      additionalProperties: false
      properties:
        accepted:
          type: boolean
        channel:
          type: string
      required:
      - accepted
      - channel
      type: object
    OperationRecord:
      additionalProperties: false
      properties:
        actor_user_id:
          anyOf:
          - format: int64
            type: integer
          - type: 'null'
        created_at:
          type: string
        id:
          format: int64
          type: integer
        method:
          type: string
        path:
          type: string
        status:
          format: int64
          type: integer
      required:
      - id
      - method
      - path
      - status
      - created_at
      type: object
    OperationRecordCountBucket:
      additionalProperties: false
      properties:
        count:
          format: int64
          type: integer
        key:
          type: string
      required:
      - key
      - count
      type: object
    OperationRecordCsv:
      description: UTF-8 CSV 文本，列为 id、actor_user_id、method、path、status、created_at
      type: string
    OperationRecordPathBucket:
      additionalProperties: false
      properties:
        count:
          format: int64
          type: integer
        error_count:
          format: int64
          type: integer
        last_seen_at:
          anyOf:
          - type: string
          - type: 'null'
        path:
          type: string
      required:
      - path
      - count
      - error_count
      type: object
    OperationRecordRetentionReport:
      additionalProperties: false
      properties:
        cutoff:
          type: string
        deleted:
          format: int64
          type: integer
        prune_batch_size:
          format: int64
          type: integer
        retention_days:
          format: int64
          type: integer
      required:
      - retention_days
      - cutoff
      - prune_batch_size
      - deleted
      type: object
    OperationRecordSummary:
      additionalProperties: false
      properties:
        by_method:
          items:
            $ref: '#/components/schemas/OperationRecordCountBucket'
          type: array
        by_status_class:
          items:
            $ref: '#/components/schemas/OperationRecordCountBucket'
          type: array
        client_error_count:
          format: int64
          type: integer
        generated_at:
          type: string
        other_count:
          format: int64
          type: integer
        redirect_count:
          format: int64
          type: integer
        server_error_count:
          format: int64
          type: integer
        success_count:
          format: int64
          type: integer
        top_limit:
          format: int64
          type: integer
        top_paths:
          items:
            $ref: '#/components/schemas/OperationRecordPathBucket'
          type: array
        total_count:
          format: int64
          type: integer
      required:
      - generated_at
      - total_count
      - success_count
      - redirect_count
      - client_error_count
      - server_error_count
      - other_count
      - top_limit
      - by_method
      - by_status_class
      - top_paths
      type: object
    Organization:
      additionalProperties: false
      properties:
        code:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        scope:
          type: string
      required:
      - id
      - code
      - name
      - scope
      type: object
    OrganizationSummary:
      additionalProperties: false
      properties:
        code:
          type: string
        created_at:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        scope:
          type: string
        status:
          type: string
      required:
      - id
      - code
      - name
      - scope
      - status
      - created_at
      type: object
    OrganizationUserSummary:
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
        email_verified_at:
          anyOf:
          - type: string
          - type: 'null'
        id:
          format: int64
          type: integer
        role_codes:
          items:
            type: string
          type: array
        status:
          type: string
      required:
      - id
      - email
      - display_name
      - status
      - role_codes
      type: object
    PermissionSummary:
      additionalProperties: false
      properties:
        code:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        product_code:
          type: string
        scope:
          type: string
      required:
      - id
      - product_code
      - scope
      - code
      - name
      type: object
    PrometheusMetrics:
      description: Prometheus text exposition format 0.0.4，内容只来自后端真实采集的 ServerStatus 指标。
      type: string
    PublicAuthSettings:
      additionalProperties: false
      properties:
        client_type_header:
          type: string
        csrf_cookie_name:
          type: string
        csrf_enabled:
          type: boolean
        csrf_header_name:
          type: string
        default_client_type:
          type: string
        product_header:
          type: string
        refresh_cookie_name:
          type: string
        self_signup_enabled:
          type: boolean
        session_cookie_name:
          type: string
      required:
      - self_signup_enabled
      - session_cookie_name
      - refresh_cookie_name
      - product_header
      - client_type_header
      - default_client_type
      - csrf_enabled
      - csrf_cookie_name
      - csrf_header_name
      type: object
    PublicSettings:
      additionalProperties: false
      properties:
        auth:
          $ref: '#/components/schemas/PublicAuthSettings'
        default_locale:
          type: string
        product_code:
          type: string
        product_name:
          type: string
        supported_locales:
          items:
            type: string
          type: array
      required:
      - product_name
      - product_code
      - default_locale
      - supported_locales
      - auth
      type: object
    RegisterRequest:
      additionalProperties: false
      properties:
        display_name:
          type: string
        email:
          type: string
        organization_code:
          type: string
        organization_name:
          type: string
        password:
          description: 注册密码
          format: password
          type: string
          writeOnly: true
      required:
      - email
      - password
      - display_name
      - organization_code
      - organization_name
      type: object
    RequestEmailVerification:
      additionalProperties: false
      properties:
        email:
          type: string
      required:
      - email
      type: object
    ResetPasswordRequest:
      additionalProperties: false
      properties:
        password:
          description: 新密码
          format: password
          type: string
          writeOnly: true
        token:
          type: string
      required:
      - token
      - password
      type: object
    RoleSummary:
      additionalProperties: false
      properties:
        code:
          type: string
        id:
          format: int64
          type: integer
        name:
          type: string
        org_id:
          anyOf:
          - format: int64
            type: integer
          - type: 'null'
        permissions:
          items:
            type: string
          type: array
        scope:
          type: string
        system_builtin:
          type: boolean
      required:
      - id
      - code
      - name
      - scope
      - system_builtin
      - permissions
      type: object
    ServerResourceMetrics:
      additionalProperties: false
      properties:
        available_disk_bytes:
          format: uint64
          minimum: 0
          type: integer
        available_memory_bytes:
          format: uint64
          minimum: 0
          type: integer
        cpu_usage_percent:
          format: float
          type: number
        disk_count:
          format: uint64
          minimum: 0
          type: integer
        load_average_fifteen:
          format: float
          type: number
        load_average_five:
          format: float
          type: number
        load_average_one:
          format: float
          type: number
        network_interface_count:
          format: uint64
          minimum: 0
          type: integer
        network_received_bytes:
          format: uint64
          minimum: 0
          type: integer
        network_transmitted_bytes:
          format: uint64
          minimum: 0
          type: integer
        process_cpu_usage_percent:
          format: float
          type: number
        process_memory_bytes:
          format: uint64
          minimum: 0
          type: integer
        process_virtual_memory_bytes:
          format: uint64
          minimum: 0
          type: integer
        source:
          type: string
        system_boot_time_seconds:
          format: uint64
          minimum: 0
          type: integer
        system_uptime_seconds:
          format: uint64
          minimum: 0
          type: integer
        total_disk_bytes:
          format: uint64
          minimum: 0
          type: integer
        total_memory_bytes:
          format: uint64
          minimum: 0
          type: integer
        total_swap_bytes:
          format: uint64
          minimum: 0
          type: integer
        used_disk_bytes:
          format: uint64
          minimum: 0
          type: integer
        used_memory_bytes:
          format: uint64
          minimum: 0
          type: integer
        used_swap_bytes:
          format: uint64
          minimum: 0
          type: integer
      required:
      - source
      - cpu_usage_percent
      - process_cpu_usage_percent
      - total_memory_bytes
      - used_memory_bytes
      - available_memory_bytes
      - process_memory_bytes
      - process_virtual_memory_bytes
      - total_swap_bytes
      - used_swap_bytes
      - total_disk_bytes
      - used_disk_bytes
      - available_disk_bytes
      - disk_count
      - network_interface_count
      - network_received_bytes
      - network_transmitted_bytes
      - system_uptime_seconds
      - system_boot_time_seconds
      - load_average_one
      - load_average_five
      - load_average_fifteen
      type: object
    ServerStatus:
      additionalProperties: false
