        os:
          type: string
        process_id:
          format: int64
          type: integer
        product_code:
          type: string
        source:
          type: string
        started_at:
          type: string
        uptime_seconds:
          format: int64
          type: integer
        version:
          type: string
      required:
      - source
      - collected_at
      - started_at
      - uptime_seconds
      - process_id
      - os
      - arch
      - available_parallelism
      - product_code
      - version
      - database_driver
      - metrics
      type: object
    SessionSnapshot:
      additionalProperties: false
      properties:
        authenticated:
          type: boolean
        client_type:
          type: string
        expires_at:
          anyOf:
          - type: string
          - type: 'null'
        mfa_enabled:
          type: boolean
        organization:
          anyOf:
          - $ref: '#/components/schemas/Organization'
          - type: 'null'
        permissions:
          items:
            type: string
          type: array
        product_code:
          type: string
        refresh_expires_at:
          anyOf:
          - type: string
          - type: 'null'
        user:
          anyOf:
          - $ref: '#/components/schemas/User'
          - type: 'null'
      required:
      - authenticated
      - product_code
      - client_type
      - permissions
      - mfa_enabled
      type: object
    SetupConfigCheck:
      additionalProperties: false
      properties:
        key:
          type: string
        message:
          type: string
        severity:
          type: string
        status:
          type: string
        title:
          type: string
      required:
      - key
      - title
      - status
      - severity
      - message
      type: object
    SetupConfigCheckSummary:
      additionalProperties: false
      properties:
        checks:
          items:
            $ref: '#/components/schemas/SetupConfigCheck'
          type: array
        ready:
          type: boolean
      required:
      - ready
      - checks
      type: object
    SetupFieldSchema:
      additionalProperties: false
      properties:
        key:
          type: string
        kind:
          type: string
        label:
          type: string
        required:
          type: boolean
        sensitive:
          type: boolean
      required:
      - key
      - label
      - kind
      - required
      - sensitive
      type: object
    SetupRun:
      additionalProperties: false
      properties:
        created_at:
          type: string
        id:
          type: string
        reason:
          anyOf:
          - type: string
          - type: 'null'
        status:
          type: string
        updated_at:
          type: string
      required:
      - id
      - status
      - created_at
      - updated_at
      type: object
    SetupSchema:
      additionalProperties: false
      properties:
        locale:
          type: string
        steps:
          items:
            $ref: '#/components/schemas/SetupStepSchema'
          type: array
