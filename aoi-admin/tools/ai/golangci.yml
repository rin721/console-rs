version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gomod
  allow-serial-runners: true

linters:
  default: standard
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - gosec
    - nilerr
    - nilnil
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - wastedassign
    - whitespace
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false
    govet:
      enable-all: true
      disable:
        - fieldalignment
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
      - common-false-positives
      - legacy
    rules:
      - path: _test\.go
        linters:
          - gosec
          - bodyclose
          - rowserrcheck
          - sqlclosecheck

issues:
  # This repository has existing baseline findings. Start by blocking new
  # issues so lint can be adopted without a full-repo cleanup first.
  new: true
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
