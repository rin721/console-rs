app:
  product_name: "Aoi[葵]"
  product_code: "console"
  environment: "local"

server:
  host: 127.0.0.1
  port: 8080

database:
  # 本地默认使用 SQLite；也可以显式切换 postgres/mysql，外部 driver 会走对应 pool、repository set 和迁移方言，不会 fallback 到 SQLite。
  driver: sqlite
  url: "sqlite://data/console.sqlite"
  max_connections: 5

migration:
  auto_apply: true

auth:
  self_signup_enabled: false
  # 本地开发可使用默认值；生产环境必须通过环境变量覆盖为强随机值。
  session_secret: "dev-session-secret-change-me-32-bytes"
  mfa_issuer: "Aoi[葵]"
  mfa_secret_key: "dev-mfa-secret-change-me-32-bytes"
  mfa_recovery_code_count: 8
  session_ttl_seconds: 86400
  refresh_ttl_seconds: 604800
  api_token_default_days: 30
  invitation_ttl_seconds: 86400
  password_reset_ttl_seconds: 1800
  email_verification_ttl_seconds: 86400
  cookie:
    name: console_session
    path: /
    same_site: Lax
    secure: false
  refresh_cookie:
    name: console_refresh
    path: /
    same_site: Lax
    secure: false
  csrf:
    # 本地默认关闭；生产环境必须显式启用，并把 secure 设为 true。
    enabled: false
    cookie_name: console_csrf
    header_name: X-CSRF-Token
    path: /
    same_site: Lax
    secure: false
    ttl_seconds: 86400
  context:
    product_header: X-Console-Product-Code
    client_type_header: X-Console-Client-Type
    default_product_code: console
    default_client_type: pc_web
  password_policy:
    min_length: 8

notification:
  # 本地 file driver 会把一次性令牌写入 data/notifications 作为投递产物；生产环境请改为 smtp 或 queue。
  driver: file
  local_dir: data/notifications
  queue:
    dir: data/notification-queue
    secret_key: "dev-notification-queue-secret-change-me-32-bytes"
  batch_size: 50
  lock_ttl_seconds: 300
  max_attempts: 3
  retry_backoff_seconds: 60
  delivery_secret_key: "dev-notification-secret-change-me-32-bytes"
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""
    from: ""
    tls: start_tls

scheduler:
  # 默认关闭后台调度，避免本地启动后主动探测外部 URL；可用 scheduler-run-once 手动执行一轮。
  enabled: false
  run_on_start: false
  traffic_probe_interval_seconds: 300
  # SSE 事件流心跳和浏览器重连提示由后端配置控制，不在前端硬编码。
  event_stream_heartbeat_seconds: 15

i18n:
  default_locale: zh-CN
  supported_locales:
    - zh-CN
    - en

webui:
  enabled: true
  dist_dir: web/app/dist

storage:
  # driver 支持 local 与 s3。s3 用于 MinIO、R2、AWS S3 等兼容对象存储；对象存储 bucket 生命周期不由本服务管理。
  driver: local
  local_dir: data/media
  max_upload_bytes: 8388608
  s3:
    endpoint: ""
    bucket: ""
    region: us-east-1
    access_key_id: ""
    secret_access_key: ""
    force_path_style: true
    allow_http: false
    prefix: media

audit:
  # 操作记录留存策略由后端配置驱动；清理命令和管理端动作都复用该策略，不在前端硬编码 TTL。
  operation_record_retention_days: 180
  operation_record_prune_batch_size: 1000

observability:
  level: info
  format: console
  # 可选：Prometheus 专用 scrape token 的 SHA-256 哈希；原始 token 只通过环境变量交给监控系统。
  prometheus_scrape_token_hash: ""
