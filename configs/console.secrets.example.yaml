# 复制为 configs/console.secrets.yaml 后再填入真实随机值；真实文件已被 .gitignore 忽略。
# 本模板中的 replace-with-* 会被生产配置校验拒绝，不能直接用于部署。

auth:
  session_secret: "replace-with-random-session-secret-at-least-32-bytes"
  mfa_secret_key: "replace-with-random-mfa-secret-at-least-32-bytes"

notification:
  delivery_secret_key: "replace-with-random-notification-secret-at-least-32-bytes"
  queue:
    secret_key: "replace-with-random-notification-queue-secret-at-least-32-bytes"
  smtp:
    username: ""
    password: ""

